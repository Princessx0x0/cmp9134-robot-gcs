services:

  robot-api:
    image: ghcr.io/francescodelduchetto/cmp9134_2526_robotsim:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:5000/docs" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      ROBOT_API_URL: "http://robot-api:5000"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-changeme123}"
      SECRET_KEY: "${SECRET_KEY:-change-this-in-production-please}"
    depends_on:
      robot-api:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8000/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${GCS_PORT:-8080}:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
